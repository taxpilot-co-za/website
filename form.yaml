version: 1
title: "Check if SARS owes you a refund - for free"
description: "Answer a few quick questions to see whether your tax return or auto-assessment may be worth reviewing. You’ll get a free indication of your refund potential, with no obligation to take the next step."

sections:
  - id: contact_details
    title: "Contact details"
    fields:
      - id: full_name
        type: short_text
        label: "Full name"
        placeholder: "Jane Smith"
        validators:
          - required

      - id: cellphone_whatsapp
        type: mobile_number
        label: "Cellphone / WhatsApp number"
        placeholder: "+27 82 123 4567"
        validators:
          - required

      - id: email
        type: email
        label: "Email address"
        placeholder: "jane@example.com"
        validators:
          - required

      - id: tax_year
        type: single_select
        label: "Which tax year should we check?"
        options:
          - label: "2026: 1 Mar 2025 - 28 Feb 2026"
            value: "2026"
          - label: "2025: 1 Mar 2024 - 28 Feb 2025"
            value: "2025"
          - label: "Not sure"
            value: "not_sure"
        validators:
          - required

    next: basic_eligibility

  - id: basic_eligibility
    title: "Basic eligibility"
    fields:
      - id: paye_deducted
        type: single_select
        label: "Were you employed and was PAYE/tax deducted from your salary?"
        options:
          - label: "Yes"
            value: "yes"
          - label: "No"
            value: "no"
          - label: "Not sure"
            value: "not_sure"
        validators:
          - required

      - id: work_situation
        type: single_select
        label: "Which best describes your work situation during the tax year?"
        options:
          - label: "I worked the full year for one employer"
            value: "full_year_one_employer"
          - label: "I changed jobs during the year"
            value: "changed_jobs"
          - label: "I was unemployed, unpaid, or on reduced pay for part of the year"
            value: "unemployed_unpaid_reduced_pay"
          - label: "I had more than one employer at the same time"
            value: "multiple_employers_same_time"
          - label: "I was self-employed, freelance, or running a business"
            value: "self_employed_freelance_business"
          - label: "Not sure"
            value: "not_sure"
        validators:
          - required

    next: refund_triggers

  - id: refund_triggers
    title: "Refund triggers"
    fields:
      - id: paid_own_retirement_annuity
        type: single_select
        label: "Did you pay into a retirement annuity from your own bank account?"
        options:
          - label: "Yes"
            value: "yes"
          - label: "No"
            value: "no"
          - label: "Not sure"
            value: "not_sure"
        validators:
          - required

      - id: paid_own_medical_aid
        type: single_select
        label: "Were you on medical aid that you paid yourself?"
        options:
          - label: "Yes"
            value: "yes"
          - label: "No, it was deducted through my employer"
            value: "deducted_through_employer"
          - label: "No medical aid"
            value: "no_medical_aid"
          - label: "Not sure"
            value: "not_sure"
        validators:
          - required

    next: sars_status

  - id: sars_status
    title: "SARS status"
    fields:
      - id: sars_tax_year_status
        type: single_select
        label: "What has happened with SARS for this tax year?"
        options:
          - label: "I have not submitted yet"
            value: "not_submitted"
          - label: "SARS auto-assessed me"
            value: "auto_assessed"
          - label: "I submitted, but I think something was missed"
            value: "submitted_something_missed"
          - label: "SARS says I owe money"
            value: "owe_money"
          - label: "SARS already paid me a refund"
            value: "refund_paid"
          - label: "Not sure"
            value: "not_sure"
        validators:
          - required

    next: document_readiness

  - id: document_readiness
    title: "Document readiness"
    fields:
      - id: available_documents
        type: multiple_select
        label: "Which documents do you already have?"
        options:
          - label: "IRP5 / salary tax certificate"
            value: "irp5"
          - label: "SARS assessment or auto-assessment"
            value: "sars_assessment"
          - label: "Retirement annuity tax certificate"
            value: "retirement_annuity_certificate"
          - label: "Medical aid tax certificate"
            value: "medical_aid_certificate"
          - label: "I do not have documents yet"
            value: "no_documents_yet"
        validators:
          - required
          - type: min
            value: 1
            message: "Select at least one option."

    next:
      - when: "data.paye_deducted === 'yes' && !['self_employed_freelance_business', 'multiple_employers_same_time'].includes(data.work_situation) && data.sars_tax_year_status !== 'refund_paid' && (['changed_jobs', 'unemployed_unpaid_reduced_pay'].includes(data.work_situation) || data.paid_own_retirement_annuity === 'yes' || data.paid_own_medical_aid === 'yes')"
        go: "https://taxpilot.co.za/?success=true"
      - else: "done"

completion:
  title: "Thanks, {{data.full_name}}"
  message: "We have received your details. Based on your answers, it does not look like a simple PAYE refund opportunity right now, but we may still review your submission if more information is needed."

connections:
  - type: email
    to: "hirebarend@gmail.com"
    subject: "SARS refund check from {{data.full_name}}"
    body: "Reply to {{data.email}} or {{data.cellphone_whatsapp}}."
    include_responses: true
